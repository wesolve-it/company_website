<div 
  x-data="{ open: false, isScrolled: false }" 
  x-init="window.addEventListener('scroll', () => { isScrolled = window.scrollY > 20 })"
  x-effect="document.body.classList.toggle('overflow-hidden', open)"
  @keydown.escape.window="open = false"
  @click.away="open = false"
  :class="isScrolled ? 'bg-[#020617]/80 backdrop-blur-lg border-b border-slate-800 py-3' : 'bg-transparent py-6'" 
  class="w-full z-[100] fixed top-0 transition-all duration-500 ease-in-out"
>
  <div class="container mx-auto flex items-center justify-between px-6 max-w-7xl">
    
    <a href="/" class="relative z-[110] transition-transform duration-300 hover:scale-105">
      <img src="../assets/img/wesolve_gray_icon.svg" alt="WESOLVE-IT Logo" class="h-10 w-auto">
    </a>

    <nav class="hidden md:flex items-center space-x-10">
      <div class="flex space-x-8 items-center">
        <a href="/" class="text-sm font-bold uppercase tracking-widest transition-colors" :class="isScrolled ? 'text-slate-300 hover:text-white' : 'text-white hover:text-blue-400'">Home</a>
        <a href="/referenzen" class="text-sm font-bold uppercase tracking-widest transition-colors" :class="isScrolled ? 'text-slate-300 hover:text-white' : 'text-white hover:text-blue-400'">Referenzen</a>
        <a href="/leistungen" class="text-sm font-bold uppercase tracking-widest transition-colors" :class="isScrolled ? 'text-slate-300 hover:text-white' : 'text-white hover:text-blue-400'">Leistungen</a>
      </div>
      
      <div class="h-6 w-[1px] bg-slate-700 mx-2"></div>

      <a href="/kontakt" 
         class="px-6 py-2.5 rounded-xl font-bold text-sm transition-all duration-300"
         :class="isScrolled ? 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg shadow-blue-900/20' : 'bg-white text-slate-950 hover:bg-blue-400 hover:text-white'">
         Projekt starten
      </a>
    </nav>

    <button 
      @click="open = !open"
      class="relative z-[110] w-10 h-10 flex flex-col justify-center items-center md:hidden group focus:outline-none"
    >
      <div class="space-y-1.5">
        <span class="block w-6 h-0.5 transition-all duration-300" :class="open ? 'rotate-45 translate-y-2 bg-white' : (isScrolled ? 'bg-white' : 'bg-white')"></span>
        <span class="block h-0.5 transition-all duration-300" :class="open ? 'w-0 opacity-0' : 'w-6 bg-white'"></span>
        <span class="block w-6 h-0.5 transition-all duration-300" :class="open ? '-rotate-45 -translate-y-2 bg-white' : (isScrolled ? 'bg-white' : 'bg-white')"></span>
      </div>
    </button>
  </div>

  <div 
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    class="fixed inset-0 z-[100] md:hidden bg-[#020617] flex flex-col justify-center items-center p-8"
  >
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-64 h-64 bg-blue-600/20 blur-[100px] -z-10"></div>

    <nav class="flex flex-col space-y-8 text-center">
      <a href="/" @click="open = false" class="text-3xl font-black text-white hover:text-blue-400 transition-colors">Home</a>
      <a href="/referenzen" @click="open = false" class="text-3xl font-black text-white hover:text-blue-400 transition-colors">Referenzen</a>
      <a href="/leistungen" @click="open = false" class="text-3xl font-black text-white hover:text-blue-400 transition-colors">Leistungen</a>
      <a href="/kontakt" @click="open = false" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Kontakt</a>
    </nav>

    <div class="absolute bottom-12 flex space-x-6">
       <p class="text-slate-500 text-xs tracking-widest uppercase">wesolve-IT • 2024</p>
    </div>
  </div>
</div>
