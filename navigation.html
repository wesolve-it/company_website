<div
  x-data="{ open: false, isScrolled: false }"
  x-init="window.addEventListener('scroll', () => { isScrolled = window.scrollY > 10 })"
  x-effect="document.body.classList.toggle('overflow-hidden', open)"
  @keydown.escape.window="open = false"
  @click.away="open = false"
  :class="isScrolled ? 'bg-white/90 shadow-sm backdrop-blur-md dark:bg-neutral-950/90' : 'bg-transparent'"
  class="fixed top-0 z-50 w-full transition-all duration-300 ease-in-out"
>
  <div
    :class="isScrolled ? 'py-3' : 'py-5'"
    class="container mx-auto flex max-w-screen-xl items-center justify-between px-4 transition-all duration-300 ease-in-out"
  >
    <!-- Logo -->
    <a href="/" onclick="navigateTo(event, '/')">
      <img src="../assets/img/wesolve_green.svg" alt="WESOLVE-IT Logo" class="-ml-7 h-8 overflow-hidden dark:brightness-0 dark:invert">
    </a>

    <!-- Navigation Links + Theme Toggle -->
    <div class="flex items-center gap-4">
    <nav class="hidden items-center gap-8 font-display font-medium md:flex">
      <a href="/" class="relative text-neutral-900 dark:text-neutral-100 transition-colors duration-300 after:absolute after:-bottom-1 after:left-0 after:h-0.5 after:w-0 after:rounded-full after:bg-lime-400 after:transition-all after:duration-300 hover:after:w-full">Home</a>
      <a href="/referenzen" class="relative text-neutral-900 dark:text-neutral-100 transition-colors duration-300 after:absolute after:-bottom-1 after:left-0 after:h-0.5 after:w-0 after:rounded-full after:bg-lime-400 after:transition-all after:duration-300 hover:after:w-full">Kunden</a>
      <a href="/leistungen" class="relative text-neutral-900 dark:text-neutral-100 transition-colors duration-300 after:absolute after:-bottom-1 after:left-0 after:h-0.5 after:w-0 after:rounded-full after:bg-lime-400 after:transition-all after:duration-300 hover:after:w-full">Leistungen</a>
      <a href="/kontakt" class="group inline-flex items-center gap-2 rounded-full bg-neutral-900 px-5 py-2.5 font-semibold text-lime-300 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[4px_4px_0px_0px_#a3e635] dark:bg-lime-400 dark:text-neutral-900 dark:hover:bg-lime-300">
        Kontakt
        <svg class="h-4 w-4 transition-transform duration-300 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
      </a>
    </nav>
    <button
      @click="window.toggleTheme()"
      aria-label="Farbschema umschalten"
      class="mr-12 flex h-10 w-10 items-center justify-center rounded-full border-2 border-neutral-200 text-neutral-900 transition-colors duration-300 hover:border-lime-400 dark:border-neutral-700 dark:text-white dark:hover:border-lime-400 md:mr-0"
    >
      <svg class="h-5 w-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
      <svg class="hidden h-5 w-5 dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
    </button>
    </div>

    <!-- Hamburger Button -->
    <button
    @click="open = !open"
    :aria-expanded="open.toString()"
    aria-controls="mobile-menu"
    aria-label="Menü umschalten"
    class="fixed right-4 top-4 z-50 flex h-8 w-8 flex-col items-center justify-center md:hidden"
  >
    <span
      class="block h-0.5 w-6 bg-neutral-900 dark:bg-white transition-transform duration-300 ease-in-out"
      :class="open ? 'rotate-45 translate-y-1.5' : ''"
    ></span>
    <span
      class="my-1 block h-0.5 w-6 bg-neutral-900 dark:bg-white transition-all duration-300 ease-in-out"
      :class="open ? 'opacity-0' : ''"
    ></span>
    <span
      class="block h-0.5 w-6 bg-neutral-900 dark:bg-white transition-transform duration-300 ease-in-out"
      :class="open ? '-rotate-45 -translate-y-1.5' : ''"
    ></span>
  </button>

  <!-- Mobile Overlay Menu -->
  <div
    class="pointer-events-none fixed inset-0 z-40 md:hidden"
    aria-hidden="true"
  >
    <!-- Semi-transparent background -->
    <div
      x-show="open"
      x-transition.opacity
      class="pointer-events-auto absolute inset-0 bg-neutral-900/40 backdrop-blur-sm"
      @click="open = false"
    ></div>

    <!-- Slide-in Panel -->
    <div
      id="mobile-menu"
      role="dialog"
      aria-modal="true"
      tabindex="-1"
      x-show="open"
      x-transition:enter="transform transition ease-out duration-300"
      x-transition:enter-start="translate-x-full"
      x-transition:enter-end="translate-x-0"
      x-transition:leave="transform transition ease-in duration-200"
      x-transition:leave-start="translate-x-0"
      x-transition:leave-end="translate-x-full"
      class="pointer-events-auto absolute right-0 top-0 flex h-full w-3/4 max-w-xs flex-col overflow-hidden rounded-l-3xl bg-white p-6 shadow-xl dark:bg-neutral-950"
    >
      <div class="pointer-events-none absolute -bottom-16 -left-16 h-48 w-48 rounded-full bg-lime-300/40 blur-2xl dark:bg-lime-500/10" aria-hidden="true"></div>
      <nav class="mt-20 flex flex-col items-end gap-6 font-display text-2xl font-semibold">
        <a href="/" class="group flex items-center gap-3 text-neutral-900 dark:text-neutral-100">
          <span class="h-2 w-2 rounded-full bg-lime-400 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></span>Home
        </a>
        <a href="/referenzen" class="group flex items-center gap-3 text-neutral-900 dark:text-neutral-100">
          <span class="h-2 w-2 rounded-full bg-lime-400 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></span>Kunden
        </a>
        <a href="/leistungen" class="group flex items-center gap-3 text-neutral-900 dark:text-neutral-100">
          <span class="h-2 w-2 rounded-full bg-lime-400 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></span>Leistungen
        </a>
        <a href="/kontakt" class="group flex items-center gap-3 text-neutral-900 dark:text-neutral-100">
          <span class="h-2 w-2 rounded-full bg-lime-400 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></span>Kontakt
        </a>
      </nav>
      <a href="/kontakt" class="relative mt-auto inline-flex items-center justify-center gap-2 rounded-full bg-neutral-900 px-6 py-3.5 font-display font-semibold text-lime-300 dark:bg-lime-400 dark:text-neutral-900">
        Beratungsgespräch
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
      </a>
    </div>
  </div>
</div>
