<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | VS Agency</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        'brand-light': '#f8fafc',
                        'brand-accent': '#84cc16',
                        'brand-primary': '#0ea5e9',
                        'brand-text': '#0f172a',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 10s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .clay-card {
            box-shadow: 20px 20px 60px #cbd5e1, -10px -10px 40px #ffffff;
        }
        .form-input {
            @apply w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 outline-none transition-all focus:bg-white focus:ring-4 focus:ring-brand-primary/10 focus:border-brand-primary;
        }
    </style>
</head>
<body class="antialiased font-sans bg-brand-light text-brand-text">

<div class="relative min-h-screen flex flex-col">
    
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-brand-primary/10 blur-[100px] animate-pulse-slow"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-brand-accent/10 blur-[100px] animate-pulse-slow"></div>
    </div>

    <nav class="relative z-50 flex items-center justify-between px-6 py-8 md:px-12 max-w-7xl mx-auto w-full">
        <a href="index.html" class="text-2xl font-extrabold tracking-tighter flex items-center gap-2">
            <div class="w-8 h-8 bg-brand-text rounded-lg flex items-center justify-center text-white text-sm font-black">VS</div>
            <span>Agency<span class="text-brand-primary">.</span></span>
        </a>
        <a href="index.html" class="group flex items-center gap-2 font-bold text-slate-500 hover:text-brand-primary transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Zurück zur Startseite
        </a>
    </nav>

    <main class="relative z-10 flex-grow container mx-auto px-6 py-12 flex flex-col lg:flex-row gap-16 items-center">
        
        <div class="w-full lg:w-5/12">
            <span class="text-[10px] font-black uppercase text-brand-primary tracking-[0.3em] mb-4 block">Get in touch</span>
            <h1 class="text-5xl md:text-6xl font-[800] tracking-tighter text-brand-text mb-8 leading-[0.9]">
                Lassen Sie uns <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-accent">Logik</span> planen.
            </h1>
            <p class="text-lg text-slate-500 mb-10 font-medium leading-relaxed">
                Bereit für den nächsten Schritt? Ob MVP, Refactoring oder technische Betreuung – wir freuen uns auf Ihr Projekt.
            </p>

            <div class="space-y-6">
                <div class="flex items-center gap-6 p-6 bg-white/50 backdrop-blur-md rounded-[2rem] border border-white shadow-sm">
                    <div class="w-14 h-14 bg-brand-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-primary/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-1">E-Mail</h4>
                        <p class="text-lg font-bold text-brand-text">hello@vs-agency.com</p>
                    </div>
                </div>

                <div class="flex items-center gap-6 p-6 bg-white/50 backdrop-blur-md rounded-[2rem] border border-white shadow-sm">
                    <div class="w-14 h-14 bg-brand-accent rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-accent/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-1">Standort</h4>
                        <p class="text-lg font-bold text-brand-text">Berlin, Deutschland</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-7/12">
            <div class="clay-card bg-white rounded-[3.5rem] p-8 md:p-12 border border-white relative overflow-hidden">
                <form action="#" method="POST" class="space-y-6 relative z-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-black uppercase text-slate-400 tracking-wider ml-2">Name</label>
                            <input type="text" placeholder="John Doe" class="form-input text-brand-text font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-black uppercase text-slate-400 tracking-wider ml-2">E-Mail</label>
                            <input type="email" placeholder="john@company.com" class="form-input text-brand-text font-bold">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-black uppercase text-slate-400 tracking-wider ml-2">Interesse</label>
                        <select class="form-input text-brand-text font-bold appearance-none cursor-pointer">
                            <option>MVP-Entwicklung</option>
                            <option>Technische Betreuung</option>
                            <option>Refactoring</option>
                            <option>Sonstiges</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-black uppercase text-slate-400 tracking-wider ml-2">Nachricht</label>
                        <textarea rows="4" placeholder="Erzählen Sie uns von Ihrer Idee..." class="form-input text-brand-text font-bold resize-none"></textarea>
                    </div>

                    <button type="submit" class="w-full group relative flex items-center justify-center gap-4 bg-brand-text text-white py-5 rounded-2xl font-black text-lg transition-all hover:scale-[1.02] hover:shadow-2xl active:scale-[0.98]">
                        Anfrage absenden
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </form>

                <div class="absolute top-[-20%] right-[-20%] w-64 h-64 bg-brand-primary/5 rounded-full blur-3xl"></div>
            </div>
        </div>

    </main>

    <footer class="relative z-10 py-10 text-center">
        <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em]">
            © 2026 VS Agency <span class="mx-2 text-brand-primary">•</span> Digital Logic First
        </p>
    </footer>

</div>

</body>
</html>
