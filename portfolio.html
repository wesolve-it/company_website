<!DOCTYPE html>
<html lang="de" x-data="{ darkMode: true, filter: 'all' }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | EmeraldCore Masterpieces</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,900;1,900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 500: '#10B981' },
                        dark: { 900: '#022C22', 950: '#011a15' }
                    }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Montserrat', sans-serif; transition: background-color 0.5s ease; }
        .heading-font { font-family: 'Barlow Condensed', sans-serif; }
        
        /* Sanfter Grid-Umbau */
        .project-grid-item {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="antialiased bg-[#F8FAFC] dark:bg-[#022C22] text-[#022C22] dark:text-white">

    <button @click="darkMode = !darkMode" class="fixed bottom-8 right-8 z-[60] w-14 h-14 rounded-2xl bg-white dark:bg-[#03261f] border border-[#10B981]/20 shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition-all">
        <span x-show="!darkMode">🌙</span>
        <span x-show="darkMode">☀️</span>
    </button>

    <header class="pt-32 pb-16 px-6 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-[#10B981]/10 blur-[120px] pointer-events-none"></div>

        <div class="max-w-7xl mx-auto text-center relative z-10">
            <nav class="mb-16">
                <a href="index.html" class="inline-flex items-center gap-3 group">
                    <div class="w-12 h-12 bg-[#10B981] rounded-2xl flex items-center justify-center text-[#022C22] shadow-lg shadow-[#10B981]/20">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                    </div>
                    <span class="heading-font text-3xl font-black uppercase italic tracking-tighter">
                        EMERALD<span class="text-[#10B981] not-italic">CORE</span>
                    </span>
                </a>
            </nav>

            <h1 class="heading-font text-6xl md:text-9xl font-black mb-6 tracking-tighter uppercase leading-[0.85] italic">
                Selected <br><span class="text-[#10B981] not-italic">Masterpieces</span>
            </h1>
            <p class="text-lg text-slate-500 dark:text-[#ECFDF5]/60 max-w-2xl mx-auto font-medium">
                Unsere Projekte sind keine Standard-Software. Sie sind digitale Maßanfertigungen.
            </p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 mb-16 flex flex-wrap justify-center gap-3">
        <template x-for="cat in ['all', 'Web App', 'Mobile', 'AI', 'FinTech']">
            <button 
                @click="filter = cat" 
                :class="filter === cat ? 'bg-[#10B981] text-[#022C22] shadow-lg shadow-[#10B981]/20' : 'bg-white dark:bg-[#03261f] text-[#10B981] border border-[#10B981]/10'"
                class="px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition-all hover:-translate-y-1"
                x-text="cat === 'all' ? 'Alle Projekte' : cat">
            </button>
        </template>
    </div>

    <section class="pb-32 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6" x-data="{
            projects: [
                { title: 'FinFlow Analytics', cat: 'FinTech', desc: 'Echtzeit-Dashboard für Krypto-Assets.', size: 'md:col-span-8', img: '📊' },
                { title: 'HealthTrack Pro', cat: 'Mobile', desc: 'Native Fitness App mit KI-Coaching.', size: 'md:col-span-4', img: '🏃‍♂️' },
                { title: 'LexiAI Assistant', cat: 'AI', desc: 'Automatisierter Support mit LLM.', size: 'md:col-span-4', img: '🤖' },
                { title: 'Nexus Market', cat: 'Web App', desc: 'Globaler Marktplatz für Web3.', size: 'md:col-span-8', img: '🎨' },
                { title: 'SafeVault', cat: 'FinTech', desc: 'Institutionelle Wallet-Infrastruktur.', size: 'md:col-span-6', img: '🔐' },
                { title: 'SolarDash', cat: 'Web App', desc: 'Smart Energy Monitoring.', size: 'md:col-span-6', img: '☀️' }
            ]
        }">
            
            <template x-for="project in projects" :key="project.title">
                <div 
                    x-show="filter === 'all' || filter === project.cat"
                    x-transition:enter="transition ease-out duration-500 delay-[100ms]"
                    x-transition:enter-start="opacity-0 scale-90 translate-y-12"
                    x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                    x-transition:leave="transition ease-in duration-300"
                    x-transition:leave-start="opacity-100 scale-100"
                    x-transition:leave-end="opacity-0 scale-90"
                    :class="project.size"
                    class="project-grid-item group relative h-[400px] rounded-[2.5rem] overflow-hidden bg-white dark:bg-[#03261f] border border-[#10B981]/10 shadow-[0_20px_50px_rgba(16,185,129,0.05)] hover:shadow-[0_30px_60px_rgba(16,185,129,0.12)] transition-all duration-500"
                >
                    <div class="h-full flex flex-col">
                        <div class="h-1/2 bg-[#022C22] flex items-center justify-center text-7xl relative overflow-hidden">
                            <span class="z-10 group-hover:scale-125 transition-transform duration-700" x-text="project.img"></span>
                            <div class="absolute inset-0 bg-gradient-to-tr from-[#10B981]/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        </div>

                        <div class="p-8 flex-grow flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-[10px] font-black text-[#10B981] uppercase tracking-[0.2em]" x-text="project.cat"></span>
                                    <svg class="w-5 h-5 text-[#10B981]/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4l8 8-8 8M4 12h16" stroke-width="2"/></svg>
                                </div>
                                <h3 class="heading-font text-3xl font-black uppercase tracking-tight mb-2 dark:text-white" x-text="project.title"></h3>
                                <p class="text-xs text-slate-500 dark:text-[#ECFDF5]/50 font-medium leading-relaxed" x-text="project.desc"></p>
                            </div>
                            
                            <a href="#" class="inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-[#10B981] group-hover:gap-4 transition-all">
                                Case Study ansehen <span>→</span>
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <section class="py-24 bg-white dark:bg-[#011a15] text-center border-t border-[#10B981]/10">
        <h2 class="heading-font text-4xl md:text-6xl font-black uppercase italic mb-8">
            Bereit für dein <span class="text-[#10B981]">Meisterwerk?</span>
        </h2>
        <a href="kontakt.html" class="inline-block px-12 py-6 bg-[#10B981] text-[#022C22] font-black uppercase rounded-2xl shadow-xl hover:scale-105 transition-all italic text-xl">
            Projekt anfragen
        </a>
    </header>

</body>
</html>
