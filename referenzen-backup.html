<!DOCTYPE html>
<html lang="de" x-data="{ darkMode: true }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referenzen | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#05070a',
                        lightBg: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        /* Glow Effekt Definition */
        .glow-hover:hover {
            box-shadow: 0 0 25px -5px rgba(168, 85, 247, 0.4);
            border-color: rgba(168, 85, 247, 0.5);
        }
        .dark .glow-hover:hover {
            box-shadow: 0 0 30px -10px rgba(129, 140, 248, 0.6);
        }
        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="transition-colors duration-300 bg-lightBg text-slate-900 dark:bg-darkBg dark:text-gray-200 font-sans">

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-xl font-bold italic dark:text-white">LOGO</div>
        <div class="flex items-center gap-6">
            <button @click="darkMode = !darkMode" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 transition">
                <template x-if="!darkMode">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                </template>
            </button>
            <a href="#" class="bg-purple-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg shadow-purple-500/20">Projekt starten</a>
        </div>
    </nav>

    <header class="py-16 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight">
            Unsere <span class="gradient-text">Referenzen</span>
        </h1>
        <p class="mt-4 text-slate-500 dark:text-gray-400 max-w-xl mx-auto italic">
            Exzellente Ergebnisse für ambitionierte Kunden.
        </p>
    </header>

    <section class="max-w-7xl mx-auto px-6 pb-24" x-data="{ limit: 6, total: 9 }">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <template x-for="i in total">
                <div x-show="i <= limit" 
                     x-transition:enter="transition ease-out duration-500"
                     x-transition:enter-start="opacity-0 translate-y-8"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     class="group relative bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-3xl overflow-hidden glow-hover transition-all duration-300">
                    
                    <div class="aspect-video bg-slate-100 dark:bg-gray-800 overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-slate-400 dark:text-gray-600 font-bold uppercase tracking-widest text-xs">
                            Projekt Vorschau Bild
                        </div>
                    </div>

                    <div class="p-6">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-purple-500">Webentwicklung</span>
                            <span class="text-[10px] text-slate-400">2024</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-purple-500 transition-colors" x-text="'Referenz Projekt ' + i"></h3>
                        <p class="text-sm text-slate-500 dark:text-gray-400 leading-relaxed mb-4">
                            Kurze Beschreibung des Projekts und der erzielten Erfolge für den Kunden.
                        </p>
                        <div class="flex gap-2">
                            <span class="text-[10px] px-2 py-1 bg-slate-100 dark:bg-white/10 rounded">AlpineJS</span>
                            <span class="text-[10px] px-2 py-1 bg-slate-100 dark:bg-white/10 rounded">Tailwind</span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="mt-16 text-center" x-show="limit < total">
            <button @click="limit = total" 
                    class="group relative px-8 py-3 bg-transparent border border-slate-300 dark:border-white/20 rounded-full font-bold hover:border-purple-500 transition-all">
                <span class="relative z-10 dark:text-white">Alle Referenzen zeigen</span>
            </button>
        </div>

    </section>

    <footer class="max-w-5xl mx-auto px-6 pb-20">
        <div class="p-1 dark:bg-gradient-to-r dark:from-purple-500 dark:to-blue-500 rounded-[42px]">
            <div class="bg-white dark:bg-darkBg p-12 rounded-[40px] text-center">
                <h2 class="text-3xl font-bold mb-6">Lust auf das nächste große Ding?</h2>
                <button class="bg-slate-900 dark:bg-white text-white dark:text-black px-10 py-4 rounded-full font-bold transition transform hover:scale-105 shadow-xl">
                    Schreib uns
                </button>
            </div>
        </div>
    </footer>

</body>
</html>
