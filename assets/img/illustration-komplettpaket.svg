<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Illustration: digitales Komplettpaket mit Dashboard, Cloud, Sicherheit und Support">
  <defs>
    <pattern id="dots-all" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#404040"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#171717"/>
  <rect width="800" height="600" fill="url(#dots-all)" opacity="0.4"/>

  <!-- Verbindungslinien -->
  <line x1="176" y1="150" x2="280" y2="220" stroke="#525252" stroke-width="2.5" stroke-dasharray="7 8"/>
  <line x1="624" y1="150" x2="520" y2="220" stroke="#525252" stroke-width="2.5" stroke-dasharray="7 8"/>
  <line x1="176" y1="450" x2="280" y2="380" stroke="#525252" stroke-width="2.5" stroke-dasharray="7 8"/>
  <line x1="624" y1="450" x2="520" y2="380" stroke="#525252" stroke-width="2.5" stroke-dasharray="7 8"/>

  <!-- Dashboard in der Mitte mit Lime-Schatten -->
  <rect x="242" y="182" width="340" height="260" rx="18" fill="#a3e635"/>
  <rect x="230" y="170" width="340" height="260" rx="18" fill="#262626" stroke="#404040" stroke-width="2"/>
  <line x1="230" y1="212" x2="570" y2="212" stroke="#404040" stroke-width="2"/>
  <circle cx="254" cy="191" r="5" fill="#ff573b"/>
  <circle cx="272" cy="191" r="5" fill="#fbbf24"/>
  <circle cx="290" cy="191" r="5" fill="#a3e635"/>

  <!-- Donut-Chart -->
  <circle cx="316" cy="300" r="38" stroke="#404040" stroke-width="14"/>
  <circle cx="316" cy="300" r="38" stroke="#a3e635" stroke-width="14" stroke-dasharray="150 89" stroke-linecap="round" transform="rotate(-90 316 300)"/>

  <!-- Kennzahlen-Reihen -->
  <rect x="386" y="252" width="150" height="10" rx="5" fill="#fafafa"/>
  <rect x="386" y="276" width="110" height="7" rx="3.5" fill="#525252"/>
  <rect x="386" y="294" width="130" height="7" rx="3.5" fill="#525252"/>
  <rect x="386" y="312" width="90" height="7" rx="3.5" fill="#525252"/>
  <rect x="386" y="334" width="72" height="24" rx="12" fill="#a3e635"/>

  <!-- Mini-Balken unten -->
  <rect x="262" y="384" width="20" height="24" rx="4" fill="#525252"/>
  <rect x="290" y="374" width="20" height="34" rx="4" fill="#525252"/>
  <rect x="318" y="364" width="20" height="44" rx="4" fill="#a3e635"/>
  <rect x="386" y="380" width="150" height="7" rx="3.5" fill="#404040"/>
  <rect x="386" y="396" width="110" height="7" rx="3.5" fill="#404040"/>

  <!-- Knoten: Cloud (Hosting) -->
  <circle cx="140" cy="120" r="42" fill="#262626" stroke="#404040" stroke-width="2"/>
  <path transform="translate(116 96) scale(2)" d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" stroke="#a3e635" stroke-width="1.25" stroke-linejoin="round"/>

  <!-- Knoten: Zahnrad (Technik & Updates) -->
  <circle cx="660" cy="120" r="42" fill="#262626" stroke="#404040" stroke-width="2"/>
  <circle cx="660" cy="120" r="13" stroke="#a3e635" stroke-width="3"/>
  <circle cx="660" cy="120" r="4" fill="#a3e635"/>
  <g stroke="#a3e635" stroke-width="4.5" stroke-linecap="round">
    <line x1="660" y1="101" x2="660" y2="106"/>
    <line x1="660" y1="134" x2="660" y2="139"/>
    <line x1="641" y1="120" x2="646" y2="120"/>
    <line x1="674" y1="120" x2="679" y2="120"/>
    <line x1="646.6" y1="106.6" x2="650.1" y2="110.1"/>
    <line x1="669.9" y1="129.9" x2="673.4" y2="133.4"/>
    <line x1="646.6" y1="133.4" x2="650.1" y2="129.9"/>
    <line x1="669.9" y1="110.1" x2="673.4" y2="106.6"/>
  </g>

  <!-- Knoten: Schild (Sicherheit) -->
  <circle cx="140" cy="480" r="42" fill="#262626" stroke="#404040" stroke-width="2"/>
  <path d="M140 458 l17 8 v13 c0 13 -17 20 -17 20 c0 0 -17 -7 -17 -20 v-13 z" stroke="#a3e635" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M133 479 l5 5 10 -11" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Knoten: Chat (Support) -->
  <circle cx="660" cy="480" r="42" fill="#262626" stroke="#404040" stroke-width="2"/>
  <rect x="640" y="464" width="40" height="28" rx="9" stroke="#a3e635" stroke-width="2.5"/>
  <path d="M652 492 l-5 10 13 -10" fill="#a3e635"/>
  <circle cx="652" cy="478" r="2.2" fill="#a3e635"/>
  <circle cx="660" cy="478" r="2.2" fill="#a3e635"/>
  <circle cx="668" cy="478" r="2.2" fill="#a3e635"/>

  <!-- Sparkles -->
  <path d="M400 74 l5 15 15 5 -15 5 -5 15 -5 -15 -15 -5 15 -5 z" fill="#a3e635"/>
  <path d="M400 496 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z" fill="#d9f99d"/>
</svg>
