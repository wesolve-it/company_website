<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Illustration: Smartphone-App mit Benachrichtigung">
  <defs>
    <pattern id="dots-app" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#404040"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#171717"/>
  <rect width="800" height="600" fill="url(#dots-app)" opacity="0.4"/>

  <!-- Zweites Smartphone im Hintergrund -->
  <g transform="rotate(-10 250 300)" opacity="0.7">
    <rect x="160" y="120" width="180" height="360" rx="28" fill="#262626" stroke="#404040" stroke-width="2"/>
    <rect x="174" y="148" width="152" height="304" rx="14" fill="#171717"/>
    <rect x="190" y="170" width="80" height="8" rx="4" fill="#404040"/>
    <rect x="190" y="192" width="120" height="40" rx="8" fill="#262626"/>
    <rect x="190" y="244" width="120" height="40" rx="8" fill="#262626"/>
  </g>

  <!-- Haupt-Smartphone mit Lime-Schatten -->
  <rect x="312" y="102" width="210" height="430" rx="32" fill="#a3e635"/>
  <rect x="300" y="90" width="210" height="430" rx="32" fill="#262626" stroke="#404040" stroke-width="2"/>
  <rect x="314" y="120" width="182" height="372" rx="18" fill="#171717"/>
  <rect x="370" y="102" width="70" height="6" rx="3" fill="#404040"/>

  <!-- App-UI -->
  <circle cx="342" cy="156" r="12" fill="#404040"/>
  <rect x="364" y="146" width="80" height="8" rx="4" fill="#fafafa"/>
  <rect x="364" y="160" width="56" height="6" rx="3" fill="#525252"/>

  <rect x="330" y="190" width="150" height="70" rx="12" fill="#a3e635"/>
  <rect x="344" y="206" width="76" height="9" rx="4.5" fill="#171717"/>
  <rect x="344" y="226" width="52" height="8" rx="4" fill="#171717"/>
  <path d="M452 238 l8 -10 8 10" stroke="#171717" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="330" y="276" width="150" height="48" rx="12" fill="#262626" stroke="#404040" stroke-width="1.5"/>
  <circle cx="352" cy="300" r="9" fill="#404040"/>
  <rect x="370" y="290" width="70" height="7" rx="3.5" fill="#737373"/>
  <rect x="370" y="304" width="48" height="6" rx="3" fill="#525252"/>
  <path d="M456 294 l6 6 -6 6" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="330" y="336" width="150" height="48" rx="12" fill="#262626" stroke="#404040" stroke-width="1.5"/>
  <circle cx="352" cy="360" r="9" fill="#404040"/>
  <rect x="370" y="350" width="70" height="7" rx="3.5" fill="#737373"/>
  <rect x="370" y="364" width="48" height="6" rx="3" fill="#525252"/>
  <path d="M456 354 l6 6 -6 6" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="330" y="396" width="150" height="48" rx="12" fill="#262626" stroke="#404040" stroke-width="1.5"/>
  <circle cx="352" cy="420" r="9" fill="#404040"/>
  <rect x="370" y="410" width="70" height="7" rx="3.5" fill="#737373"/>
  <rect x="370" y="424" width="48" height="6" rx="3" fill="#525252"/>
  <path d="M456 414 l6 6 -6 6" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tab-Bar mit FAB -->
  <rect x="330" y="456" width="150" height="26" rx="13" fill="#262626"/>
  <circle cx="358" cy="469" r="4" fill="#525252"/>
  <circle cx="452" cy="469" r="4" fill="#525252"/>
  <circle cx="405" cy="462" r="17" fill="#a3e635"/>
  <path d="M405 455 v14 M398 462 h14" stroke="#171717" stroke-width="3" stroke-linecap="round"/>

  <!-- Benachrichtigungs-Chip -->
  <rect x="540" y="140" width="216" height="64" rx="18" fill="#262626" stroke="#404040" stroke-width="2"/>
  <circle cx="572" cy="172" r="14" fill="#a3e635"/>
  <path d="M565 172 l5 5 9 -10" stroke="#171717" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="596" y="158" width="124" height="8" rx="4" fill="#fafafa"/>
  <rect x="596" y="174" width="90" height="7" rx="3.5" fill="#525252"/>

  <!-- Like-Chip -->
  <rect x="556" y="404" width="120" height="52" rx="16" fill="#262626" stroke="#404040" stroke-width="2"/>
  <path d="M580 422 c-3 -5 -11 -3 -11 3 c0 6 11 13 11 13 c0 0 11 -7 11 -13 c0 -6 -8 -8 -11 -3 z" fill="#a3e635"/>
  <rect x="602" y="426" width="56" height="8" rx="4" fill="#737373"/>

  <!-- Sparkles -->
  <path d="M700 300 l5 15 15 5 -15 5 -5 15 -5 -15 -15 -5 15 -5 z" fill="#a3e635"/>
  <path d="M96 508 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z" fill="#d9f99d"/>
  <path d="M120 68 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z" fill="#a3e635"/>
</svg>
