<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Illustration: modernes Webseiten-Layout im Browser">
  <defs>
    <pattern id="dots-web" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#404040"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#171717"/>
  <rect width="800" height="600" fill="url(#dots-web)" opacity="0.4"/>

  <!-- Browserfenster mit Lime-Schatten -->
  <rect x="132" y="92" width="560" height="440" rx="18" fill="#a3e635"/>
  <rect x="120" y="80" width="560" height="440" rx="18" fill="#262626" stroke="#404040" stroke-width="2"/>
  <line x1="120" y1="128" x2="680" y2="128" stroke="#404040" stroke-width="2"/>
  <circle cx="148" cy="104" r="6" fill="#ff573b"/>
  <circle cx="170" cy="104" r="6" fill="#fbbf24"/>
  <circle cx="192" cy="104" r="6" fill="#a3e635"/>
  <rect x="220" y="92" width="300" height="24" rx="12" fill="#171717"/>
  <rect x="236" y="102" width="140" height="5" rx="2.5" fill="#525252"/>

  <!-- Navigationszeile -->
  <circle cx="158" cy="158" r="9" fill="#a3e635"/>
  <rect x="176" y="154" width="60" height="8" rx="4" fill="#fafafa"/>
  <rect x="452" y="155" width="36" height="6" rx="3" fill="#737373"/>
  <rect x="500" y="155" width="36" height="6" rx="3" fill="#737373"/>
  <rect x="548" y="155" width="36" height="6" rx="3" fill="#737373"/>
  <rect x="600" y="146" width="52" height="24" rx="12" fill="#a3e635"/>

  <!-- Hero-Bereich der Beispielseite -->
  <rect x="150" y="200" width="210" height="14" rx="7" fill="#fafafa"/>
  <rect x="150" y="224" width="140" height="14" rx="7" fill="#a3e635"/>
  <rect x="150" y="256" width="190" height="7" rx="3.5" fill="#525252"/>
  <rect x="150" y="272" width="160" height="7" rx="3.5" fill="#525252"/>
  <rect x="150" y="300" width="126" height="36" rx="18" fill="#a3e635"/>
  <rect x="170" y="314" width="56" height="8" rx="4" fill="#171717"/>

  <!-- Bildblock mit Grafik -->
  <rect x="420" y="196" width="230" height="140" rx="12" fill="#171717" stroke="#404040" stroke-width="2"/>
  <circle cx="608" cy="224" r="12" fill="#a3e635"/>
  <path d="M436 318 l52 -62 32 36 40 -48 58 74" stroke="#525252" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M520 292 l40 -48 58 74" stroke="#a3e635" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Karten-Grid -->
  <rect x="150" y="366" width="160" height="128" rx="12" fill="#171717" stroke="#404040" stroke-width="2"/>
  <rect x="162" y="378" width="136" height="44" rx="8" fill="#262626"/>
  <rect x="162" y="434" width="100" height="8" rx="4" fill="#fafafa"/>
  <rect x="162" y="450" width="70" height="6" rx="3" fill="#525252"/>
  <rect x="162" y="470" width="48" height="6" rx="3" fill="#a3e635"/>

  <rect x="330" y="366" width="160" height="128" rx="12" fill="#171717" stroke="#404040" stroke-width="2"/>
  <rect x="342" y="378" width="136" height="44" rx="8" fill="#262626"/>
  <rect x="342" y="434" width="100" height="8" rx="4" fill="#fafafa"/>
  <rect x="342" y="450" width="70" height="6" rx="3" fill="#525252"/>
  <rect x="342" y="470" width="48" height="6" rx="3" fill="#a3e635"/>

  <rect x="510" y="366" width="160" height="128" rx="12" fill="#171717" stroke="#404040" stroke-width="2"/>
  <rect x="522" y="378" width="136" height="44" rx="8" fill="#262626"/>
  <rect x="522" y="434" width="100" height="8" rx="4" fill="#fafafa"/>
  <rect x="522" y="450" width="70" height="6" rx="3" fill="#525252"/>
  <rect x="522" y="470" width="48" height="6" rx="3" fill="#a3e635"/>

  <!-- Mauszeiger auf dem CTA -->
  <path d="M262 322 v24 l6 -5 5 11 6 -3 -5 -10 8 -2 z" fill="#fafafa" stroke="#171717" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <path d="M736 180 l5 15 15 5 -15 5 -5 15 -5 -15 -15 -5 15 -5 z" fill="#a3e635"/>
  <path d="M64 420 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z" fill="#d9f99d"/>
</svg>
