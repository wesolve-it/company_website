  <!-- Schwebender Erfolgs-Chip -->
  <rect x="40" y="486" width="210" height="60" rx="18" fill="#262626" stroke="#404040" stroke-width="2"/>
  <circle cx="70" cy="516" r="14" fill="#a3e635"/>
  <path d="M63 516 l5 5 9 -10" stroke="#171717" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="94" y="502" width="120" height="8" rx="4" fill="#fafafa"/>
  <rect x="94" y="518" width="90" height="7" rx="3.5" fill="#525252"/>

  <!-- Sparkles -->
  <path d="M712 64 l6 18 18 6 -18 6 -6 18 -6 -18 -18 -6 18 -6 z" fill="#a3e635"/>
  <path d="M56 176 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z" fill="#d9f99d"/>
  <path d="M756 420 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z" fill="#a3e635"/>
