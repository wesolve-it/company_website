  <line x1="70" y1="138" x2="540" y2="138" stroke="#404040" stroke-width="2"/>
  <circle cx="98" cy="114" r="6" fill="#ff573b"/>
  <circle cx="120" cy="114" r="6" fill="#fbbf24"/>
  <circle cx="142" cy="114" r="6" fill="#a3e635"/>
  <rect x="170" y="102" width="250" height="24" rx="12" fill="#171717"/>
  <rect x="186" y="112" width="120" height="5" rx="2.5" fill="#525252"/>

  <!-- Headline, Text, CTA -->
  <rect x="100" y="170" width="230" height="16" rx="8" fill="#fafafa"/>
  <rect x="100" y="196" width="150" height="16" rx="8" fill="#a3e635"/>
  <rect x="100" y="238" width="220" height="8" rx="4" fill="#525252"/>
  <rect x="100" y="256" width="190" height="8" rx="4" fill="#525252"/>
