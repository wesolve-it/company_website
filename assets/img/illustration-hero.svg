  <path d="M196 320 l8 6 -8 6" stroke="#171717" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart-Panel im Browser -->
  <rect x="360" y="170" width="150" height="176" rx="12" fill="#171717" stroke="#404040" stroke-width="2"/>
  <polyline points="378,320 408,290 428,302 458,258 490,216" stroke="#a3e635" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="490" cy="216" r="5" fill="#a3e635"/>

  <!-- Karten-Reihe im Browser -->
  <rect x="100" y="378" width="124" height="56" rx="10" fill="#171717" stroke="#404040" stroke-width="2"/>
  <circle cx="118" cy="396" r="6" fill="#a3e635"/>
  <rect x="112" y="412" width="70" height="6" rx="3" fill="#525252"/>
  <rect x="240" y="378" width="124" height="56" rx="10" fill="#171717" stroke="#404040" stroke-width="2"/>
  <circle cx="258" cy="396" r="6" fill="#a3e635"/>
  <rect x="252" y="412" width="70" height="6" rx="3" fill="#525252"/>
  <rect x="380" y="378" width="124" height="56" rx="10" fill="#171717" stroke="#404040" stroke-width="2"/>
  <circle cx="398" cy="396" r="6" fill="#a3e635"/>
  <rect x="392" y="412" width="70" height="6" rx="3" fill="#525252"/>

  <!-- Smartphone mit Lime-Schatten -->
  <g transform="rotate(6 645 330)">
    <rect x="572" y="172" width="170" height="340" rx="28" fill="#a3e635"/>
    <rect x="560" y="160" width="170" height="340" rx="28" fill="#262626" stroke="#404040" stroke-width="2"/>
