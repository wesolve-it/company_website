    <rect x="586" y="226" width="118" height="56" rx="10" fill="#a3e635"/>
    <rect x="598" y="240" width="60" height="7" rx="3.5" fill="#171717"/>
    <rect x="598" y="256" width="40" height="7" rx="3.5" fill="#171717"/>
    <rect x="586" y="294" width="118" height="40" rx="10" fill="#262626" stroke="#404040" stroke-width="1.5"/>
    <circle cx="604" cy="314" r="8" fill="#404040"/>
    <rect x="620" y="306" width="56" height="6" rx="3" fill="#737373"/>
    <rect x="620" y="318" width="40" height="6" rx="3" fill="#525252"/>
    <rect x="586" y="342" width="118" height="40" rx="10" fill="#262626" stroke="#404040" stroke-width="1.5"/>
