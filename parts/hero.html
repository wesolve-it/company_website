<div class="relative overflow-hidden" x-data="{ loaded: false }"
  x-init="setTimeout(() => loaded = true, 100)">

  <div class="absolute inset-0 z-0">
    <div
      class="absolute top-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-brand-primary/10 blur-[100px] animate-pulse-slow">
    </div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-brand-accent/10 blur-[120px] animate-pulse-slow"
      style="animation-delay: 2s"></div>

    <template x-for="i in 8">
      <div class="absolute glass-particle rounded-full opacity-60 animate-float" :style="`
                width: ${Math.random() * 30 + 5}px; 
                height: ${Math.random() * 30 + 5}px; 
                left: ${Math.random() * 100}%; 
                top: ${Math.random() * 100}%;
                animation-delay: ${Math.random() * 5}s;
                animation-duration: ${Math.random() * 10 + 5}s;
            `"></div>
    </template>
  </div>

  <main class="relative z-10 container mx-auto mb-60 flex flex-col items-center px-6 pt-10 md:flex-row md:pt-48 lg:px-12">

    <div class="w-full md:w-1/2">
      <div :class="loaded ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'"
        class="transition-all duration-1000 ease-out" x-cloak>
        <h2 class="text-2xl font-bold uppercase tracking-widest text-brand-primary md:text-3xl">Modern Tech</h2>
        <h1 class="text-7xl font-[800] uppercase leading-[0.85] tracking-tighter text-brand-text md:text-[110px]">
          Deine Idee <br> <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-accent">Digital</span>
        </h1>

        <p class="mt-8 max-w-md text-lg leading-relaxed text-slate-500 font-medium">
          Wir bauen **High-Performance MVPs** und digitale Erlebnisse, die Ihre Kunden begeistern. Schnelle
          Entwicklung trifft auf höchste Präzision.
        </p>

        <div class="mt-10 flex flex-wrap gap-5">
          <a href="/kontakt"
            class="group flex items-center gap-3 rounded-2xl bg-brand-primary px-8 py-4 text-lg font-bold text-white transition-all hover:scale-105 hover:shadow-lg hover:shadow-brand-primary/30">
            Projekt starten
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </a>
          <div class="flex items-center gap-3">
            <div class="flex -space-x-3">
              <div
                class="w-10 h-10 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-600">
                MR</div>
              <div
                class="w-10 h-10 rounded-full border-2 border-white bg-brand-primary/20 flex items-center justify-center text-[10px] text-brand-primary font-bold">
                WI</div>
            </div>
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">wesolve-IT Team</span>
          </div>
        </div>
      </div>
    </div>

    <div class="relative w-full mt-24 md:mt-0 md:w-1/2 flex justify-center items-center">

      <div class="absolute h-80 w-80 rounded-full bg-brand-primary/5 md:h-[550px] md:w-[550px] blur-3xl animate-pulse">
      </div>

      <div class="relative z-20" x-data="{ hover: false }" @mouseenter="hover = true" @mouseleave="hover = false">

        <div
          class="relative w-56 h-[440px] bg-white rounded-[3.5rem] border-[10px] border-white shadow-[20px_20px_60px_#cbd5e1,-10px_-10px_40px_#ffffff] flex flex-col items-center p-4 transition-all duration-700 ease-in-out animate-float"
          :class="hover ? 'rotate-3 scale-105' : 'rotate-0'">

          <div
            class="w-full h-full bg-gradient-to-br from-slate-50 to-white rounded-[2.8rem] flex flex-col items-center p-6 border border-slate-100 overflow-hidden">
            <div
              class="mt-4 w-14 h-14 bg-brand-primary rounded-2xl shadow-lg shadow-brand-primary/20 flex items-center justify-center mb-6">
              <span class="text-white text-sm font-black italic">MVP</span>
            </div>

            <div class="space-y-3 w-full opacity-60">
              <div class="h-2 w-full bg-slate-200 rounded-full"></div>
              <div class="h-2 w-2/3 bg-slate-100 rounded-full"></div>
            </div>

            <div class="mt-6 flex items-end gap-1 h-12 w-full justify-center">
              <div class="w-2 bg-brand-primary/20 rounded-t h-[40%]"></div>
              <div class="w-2 bg-brand-primary/40 rounded-t h-[70%]"></div>
              <div class="w-2 bg-brand-primary rounded-t h-[100%]"></div>
            </div>

            <div
              class="mt-auto mb-4 w-full h-12 bg-brand-text rounded-2xl flex items-center justify-center text-white text-[10px] font-extrabold tracking-widest uppercase">
              Launch
            </div>
          </div>
        </div>

        <div
          class="absolute -left-20 top-12 h-20 w-20 animate-float rounded-3xl bg-white border border-slate-100 p-4 shadow-xl flex items-center justify-center transform -rotate-12">
          <code class="text-brand-primary font-black text-2xl">&lt;/&gt;</code>
        </div>

        <div
          class="absolute -top-16 right-0 h-16 w-16 animate-bounce rounded-full bg-white border border-slate-100 shadow-lg flex items-center justify-center text-3xl">
          🚀
        </div>

        <div
          class="absolute -right-16 top-1/2 -translate-y-1/2 h-20 w-20 animate-float rounded-[2.5rem] bg-white border border-slate-50 shadow-xl flex items-center justify-center text-3xl"
          style="animation-delay: 1.5s">
          <svg xmlns="http://www.w3.org/2000/svg"
            class="h-10 w-10 text-brand-primary animate-[spin_12s_linear_infinite]" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          </svg>
        </div>

        <div
          class="absolute -bottom-12 -right-12 h-28 w-40 animate-float-slow rounded-[2rem] bg-white p-6 shadow-2xl border border-slate-50 hidden lg:block"
          style="animation-delay: 0.5s">
          <div class="flex items-end gap-2 h-full">
            <div class="flex-1 bg-slate-100 rounded-t-md h-[40%]"></div>
            <div class="flex-1 bg-brand-primary/20 rounded-t-md h-[60%]"></div>
            <div class="flex-1 bg-brand-primary rounded-t-md h-[95%]"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="w-full px-6 md:px-12 flex justify-between items-end z-20">
    <div class="flex items-center gap-6">
      <div class="hidden md:flex flex-col">
        <span class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-1">Service
          Status</span>
        <div class="flex items-center gap-2 font-bold text-xs text-brand-primary">
          <div class="w-2 h-2 bg-brand-primary rounded-full animate-ping"></div>
          All Systems Operational
        </div>
      </div>
    </div>

    <div class="flex flex-col items-end">
      <div
        class="rounded-full bg-white px-5 py-2 text-[10px] font-bold text-brand-text border border-slate-100 shadow-sm tracking-[0.3em] uppercase">
        <span x-text="new Date().toLocaleDateString('de-DE', { month: 'short', day: 'numeric', year: 'numeric' })"></span>
      </div>
    </div>
  </footer>

</div>
