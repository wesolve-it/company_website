<div x-data="{ open: false, isScrolled: false }"
  x-init="window.addEventListener('scroll', () => { isScrolled = window.scrollY > 20 })"
  x-effect="document.body.classList.toggle('overflow-hidden', open)" @keydown.escape.window="open = false"
  @click.away="open = false"
  :class="isScrolled ? 'bg-white/80 backdrop-blur-xl border-b border-slate-200 shadow-sm py-3' : 'bg-transparent py-6'"
  class="w-full z-[100] fixed top-0 transition-all duration-500 ease-in-out font-sans">
  <div class="container mx-auto flex items-center justify-between px-6 max-w-7xl">

    <a href="/" class="relative z-[110] transition-transform duration-300 hover:scale-105">
      <img src="./assets/img/wesolve_green.svg" alt="wesolve-IT Logo" class="h-8 md:h-10 w-auto">
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center space-x-10">
      <div class="flex space-x-8 items-center">
        <a href="/" class="text-sm font-bold uppercase tracking-widest transition-colors"
          :class="isScrolled ? 'text-slate-600 hover:text-emerald-600' : 'text-slate-900 hover:text-emerald-500'">Home</a>
        <a href="/leistungen" class="text-sm font-bold uppercase tracking-widest transition-colors"
          :class="isScrolled ? 'text-slate-600 hover:text-emerald-600' : 'text-slate-900 hover:text-emerald-500'">Leistungen</a>
        <a href="/referenzen" class="text-sm font-bold uppercase tracking-widest transition-colors"
          :class="isScrolled ? 'text-slate-600 hover:text-emerald-600' : 'text-slate-900 hover:text-emerald-500'">Referenzen</a>
        <a href="/kontakt" class="text-sm font-bold uppercase tracking-widest transition-colors"
          :class="isScrolled ? 'text-slate-600 hover:text-emerald-600' : 'text-slate-900 hover:text-emerald-500'">Kontakt</a>
      </div>

      <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>

      <a href="/kontakt"
        class="group relative overflow-hidden rounded-full px-8 py-3 font-bold text-sm transition-all duration-300 shadow-md hover:shadow-xl hover:-translate-y-0.5"
        :class="isScrolled ? 'bg-emerald-600 text-white hover:bg-emerald-500' : 'bg-slate-900 text-white hover:bg-emerald-600'">
        <span class="relative z-10">Projekt starten</span>
      </a>
    </nav>

    <!-- Mobile Menu Button -->
    <button @click="open = !open"
      class="relative z-[110] w-10 h-10 flex flex-col justify-center items-center md:hidden group focus:outline-none">
      <div class="space-y-1.5">
        <span class="block w-6 h-0.5 transition-all duration-300"
          :class="open ? 'rotate-45 translate-y-2 bg-slate-900' : 'bg-slate-900'"></span>
        <span class="block h-0.5 transition-all duration-300"
          :class="open ? 'w-0 opacity-0' : 'w-6 bg-slate-900'"></span>
        <span class="block w-6 h-0.5 transition-all duration-300"
          :class="open ? '-rotate-45 -translate-y-2 bg-slate-900' : 'bg-slate-900'"></span>
      </div>
    </button>
  </div>

  <!-- Mobile Menu Overlay -->
  <div x-show="open" x-transition:enter="transition ease-out duration-310"
    x-transition:enter-start="opacity-0 translate-x-full" x-transition:enter-end="opacity-100 translate-x-0"
    x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-x-0"
    x-transition:leave-end="opacity-0 translate-x-full"
    class="fixed inset-0 z-[100] md:hidden bg-white flex flex-col justify-center items-center p-8">
    <div
      class="absolute top-0 right-0 w-64 h-64 bg-emerald-50 rounded-full blur-[100px] -z-10 -translate-y-1/2 translate-x-1/2">
    </div>
    <div
      class="absolute bottom-0 left-0 w-64 h-64 bg-emerald-50 rounded-full blur-[100px] -z-10 translate-y-1/2 -translate-x-1/2">
    </div>

    <nav class="flex flex-col space-y-8 text-center">
      <a href="/" @click="open = false"
        class="text-4xl font-black text-slate-900 hover:text-emerald-600 transition-colors">Home</a>
      <a href="/leistungen" @click="open = false"
        class="text-4xl font-black text-slate-900 hover:text-emerald-600 transition-colors">Leistungen</a>
      <a href="/referenzen" @click="open = false"
        class="text-4xl font-black text-slate-900 hover:text-emerald-600 transition-colors">Referenzen</a>
      <a href="/kontakt" @click="open = false"
        class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500">Kontakt</a>
    </nav>

    <div class="absolute bottom-12 text-center">
      <p class="text-slate-400 text-xs tracking-widest uppercase mb-4">wesolve-IT • 2024</p>
      <div class="w-12 h-1 bg-emerald-500 mx-auto rounded-full"></div>
    </div>
  </div>
</div>
